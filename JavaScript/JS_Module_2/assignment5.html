<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module 2 - Assignment 5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assignment-style.css">
</head>
<body>
<div class="assignment-card">
    <h1>Duplicate Check</h1>
    <p>Enter numbers. If you enter a number you've already given, the program stops and shows all unique numbers.</p>

    <button type="button" onclick="checkDupes()">Start Input</button>

    <p id="statusMsg" style="color: #e74c3c; font-weight: bold; margin-top: 15px;"></p>
    <ul id="resultList" style="text-align: left; display: inline-block;"></ul>

    <script>
        function checkDupes() {
            let nums = [];
            const listElement = document.querySelector("#resultList");
            const msgElement = document.querySelector("#statusMsg");

            listElement.innerHTML = "";
            msgElement.innerHTML = "";

            while (true) {
                let input = prompt("Enter a number:");

                if (input === null) break;

                let n = parseInt(input);

                if (isNaN(n)) {
                    alert("Please enter a valid number.");
                    continue;
                }

                if (nums.includes(n)) {
                    msgElement.innerHTML = "The number " + n + " has already been given! Stopping...";
                    break;
                }

                nums.push(n);
            }

            nums.sort((a, b) => a - b);

            for (let n of nums) {
                let li = document.createElement("li");
                li.textContent = n;
                listElement.appendChild(li);
            }
        }
    </script>

    <br>
    <a href="module2_index.html" class="back-link">← Back to Module 2</a>
</div>
</body>
</html>
