<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment 2 - Print input</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assignment-style.css">
</head>
<body>
<div class="assignment-card">
        <h1>Assignment 2 - Print input</h1>
        <form id="getname">
            Write your name: <input type="text" id="userName" name="name"><br>
            <button type="button" onclick="printname()">Submit</button>
        </form>

        <p id="Target"></p>

    <script>
        function printname() {
        const inputField = document.querySelector("#userName");
        const name = inputField.value;
        document.querySelector("#Target").innerHTML = "Welcome " + name + "!";
        }
    </script>
    <a href="module1_index.html">Module 1</a>
</div>
</body>
</html>
