<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment 7 - Dice roller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assignment-style.css">
</head>
<body>
  <div class="assignment-card">
      <h1>Dice Roller</h1>
      <form>
          Number of dice: <input type="text" id="diceCount" placeholder="How many dice?">
          <button type="button" onclick="rollDice()">Roll Dice</button>
      </form>
      <p id="DiceResult"></p>
      <script>
          function rollDice() {
              const count = parseInt(document.querySelector("#diceCount").value);
              let sum = 0;
              if (isNaN(count) || count < 1) {
                  document.querySelector("#DiceResult").innerHTML = "Enter a valid number.";
                  return;
              }
              for (let i = 0; i < count; i++) {
                  sum += Math.floor(Math.random() * 6) + 1;
              }
              document.querySelector("#DiceResult").innerHTML = "The sum of " + count + " dice is " + sum;
          }
      </script>
    <a href="module1_index.html">Module 1</a>
  </div>
</body>
</html>
