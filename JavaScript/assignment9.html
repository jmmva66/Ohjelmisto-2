<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment 9 - Prime number checker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assignment-style.css">
</head>
<body>
  <div class="assignment-card">
    <h1>Prime Check</h1>
    <input type="text" id="primeNum" placeholder="Enter integer">
    <button type="button" onclick="checkPrime()">Check</button>
    <p id="PrimeResult"></p>
    <script>
        function checkPrime() {
            const n = parseInt(document.querySelector("#primeNum").value);
            let isPrime = true;
            if (n < 2 || isNaN(n)) isPrime = false;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) { isPrime = false; break; }
            }
            document.querySelector("#PrimeResult").innerHTML = n + (isPrime ? " is a prime number." : " is not a prime number.");
        }
    </script>
    <a href="module1_index.html">Module 1</a>
</div>
</body>
</html>
